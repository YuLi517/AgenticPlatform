<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerticalAgent Stage 1 — 多 Provider 流式对话</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f7f7f8; color: #202123; display: flex;
  }

  /* ============== 左侧栏 ============== */
  aside#sidebar {
    width: 260px; min-width: 260px;
    background: #202123; color: #ececec;
    display: flex; flex-direction: column;
    border-right: 1px solid #2d2d2d;
  }
  aside #sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid #2d2d2d;
  }
  aside #newSessionBtn {
    width: 100%;
    background: transparent;
    color: #ececec;
    border: 1px solid #4a4a4a;
    border-radius: 6px;
    padding: 10px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }
  aside #newSessionBtn:hover { background: #2a2b2c; }
  aside #newSessionBtn .icon { font-size: 14px; font-weight: bold; }
  aside #newSessionBtn .text { flex: 1; text-align: left; }

  /* Stage 2C: 侧栏 tab 切换 */
  #sidebar-tabs {
    display: flex;
    border-bottom: 1px solid #2d2d2d;
    flex-shrink: 0;
  }
  .sidebar-tab {
    flex: 1;
    background: transparent;
    border: none;
    color: #8e8ea0;
    padding: 10px 8px;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .sidebar-tab:hover { color: #ececec; }
  .sidebar-tab.active {
    color: #ececec;
    border-bottom-color: #1f4e79;
  }

  /* Stage 2C: 文档库面板 */
  #documentPanel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #document-toolbar {
    padding: 8px 12px;
    border-bottom: 1px solid #2d2d2d;
    flex-shrink: 0;
  }
  #uploadDocBtn {
    width: 100%;
    background: #1f4e79;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #uploadDocBtn:hover { background: #163d5e; }
  #documentList {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  #documentList::-webkit-scrollbar { width: 6px; }
  #documentList::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 3px; }
  .doc-item {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 4px;
    background: #2a2b2c;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.15s;
    position: relative;
  }
  .doc-item:hover { border-color: #4a4a4a; }
  .doc-item .doc-title {
    font-size: 13px;
    color: #ececec;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 4px;
  }
  .doc-item .doc-meta {
    font-size: 10px;
    color: #6e6e80;
    display: flex;
    justify-content: space-between;
  }
  .doc-item .doc-delete {
    position: absolute;
    top: 6px;
    right: 6px;
    background: transparent;
    border: none;
    color: #8e8ea0;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
    font-size: 14px;
  }
  .doc-item:hover .doc-delete { opacity: 0.8; }
  .doc-item .doc-delete:hover { background: #c53030; color: #fff; opacity: 1; }

  /* Stage 2C: 上传文档 modal */
  #uploadDocModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #uploadDocModal.show { display: flex; }
  #uploadDocModal .modal-content {
    background: #fff;
    border-radius: 10px;
    padding: 24px;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  #uploadDocModal h3 { margin: 0 0 16px; color: #202123; font-size: 16px; }
  #uploadDocModal label {
    display: block;
    font-size: 12px;
    color: #6e6e80;
    margin-bottom: 4px;
    margin-top: 10px;
  }
  #uploadDocModal input[type="text"], #uploadDocModal textarea {
    width: 100%;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    box-sizing: border-box;
  }
  #uploadDocModal input[type="text"]:focus, #uploadDocModal textarea:focus {
    border-color: #1f4e79;
  }
  #uploadDocModal textarea { min-height: 200px; resize: vertical; }
  #uploadDocModal .modal-actions {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  #uploadDocModal button {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #d0d0d0;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
  }
  #uploadDocModal button.primary {
    background: #1f4e79;
    color: #fff;
    border-color: #1f4e79;
  }
  #uploadDocModal button.primary:disabled {
    background: #c0c0c0;
    border-color: #c0c0c0;
    cursor: not-allowed;
  }

  /* Upload tabs */
  #uploadDocModal .upload-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 1px solid #e5e5e5;
  }
  #uploadDocModal .upload-tab {
    flex: 1;
    background: transparent;
    border: none;
    padding: 8px 4px;
    color: #6e6e80;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  #uploadDocModal .upload-tab:hover { color: #202123; }
  #uploadDocModal .upload-tab.active {
    color: #1f4e79;
    border-bottom-color: #1f4e79;
    font-weight: 500;
  }

  /* File drop zone */
  #fileDropZone {
    border: 2px dashed #d0d0d0;
    border-radius: 8px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin: 8px 0 16px;
    position: relative;
  }
  #fileDropZone:hover { border-color: #1f4e79; background: #f8faff; }
  #fileDropZone.dragover { border-color: #1f4e79; background: #f0f7ff; }
  #fileDropZone .file-drop-hint {
    color: #6e6e80;
    font-size: 13px;
    line-height: 1.8;
    pointer-events: none;
  }
  #fileDropZone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  #fileSelectedInfo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #e3f2fd;
    color: #1565c0;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
  }
  #fileClearBtn {
    background: transparent;
    border: none;
    color: #1565c0;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  aside #sessionList {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  aside #sessionList::-webkit-scrollbar { width: 6px; }
  aside #sessionList::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 3px; }

  /* Stage 2 新增：会话搜索框 */
  #session-search-wrap {
    position: relative;
    padding: 8px 12px;
    border-bottom: 1px solid #2d2d2d;
  }
  #sessionSearch {
    width: 100%;
    background: #2a2b2c;
    border: 1px solid #4a4a4a;
    color: #ececec;
    padding: 7px 28px 7px 10px;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  #sessionSearch::placeholder { color: #6e6e80; }
  #sessionSearch:focus { border-color: #1f4e79; }
  #searchClearBtn {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: #8e8ea0;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 3px;
  }
  #searchClearBtn:hover { background: #4a4a4a; color: #fff; }

  /* Stage 2 新增：加载更多按钮 */
  #loadMoreWrap {
    padding: 4px 12px 8px;
  }
  #loadMoreBtn {
    width: 100%;
    background: transparent;
    color: #8e8ea0;
    border: 1px dashed #4a4a4a;
    border-radius: 6px;
    padding: 6px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #loadMoreBtn:hover {
    background: #2a2b2c;
    color: #ececec;
    border-color: #6e6e80;
  }
  /* 搜索结果摘要 */
  #searchSummary {
    padding: 4px 14px;
    font-size: 11px;
    color: #8e8ea0;
    border-bottom: 1px solid #2d2d2d;
    display: none;
  }

  .session-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 2px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
    transition: background 0.1s;
    position: relative;
  }
  .session-item:hover { background: #2a2b2c; }
  .session-item.active { background: #343541; }
  .session-item .session-icon { font-size: 14px; opacity: 0.7; flex-shrink: 0; }
  .session-item .session-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-item .delete-btn {
    opacity: 0;
    background: transparent;
    border: none;
    color: #999;
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: opacity 0.1s, background 0.1s;
  }
  .session-item:hover .delete-btn { opacity: 0.8; }
  .session-item .delete-btn:hover { background: #c53030; color: #fff; opacity: 1; }

  aside #sidebar-footer {
    padding: 10px 12px;
    border-top: 1px solid #2d2d2d;
    font-size: 11px;
    color: #8e8ea0;
    display: flex; align-items: center; gap: 8px;
  }
  aside #sidebar-footer .provider-info {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  aside #sidebar-footer .settings-btn {
    background: transparent; border: none; color: #ececec;
    cursor: pointer; padding: 4px; border-radius: 4px;
  }
  aside #sidebar-footer .settings-btn:hover { background: #2a2b2c; }

  /* ============== 主区域 ============== */
  main#main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  header#topbar {
    height: 56px; padding: 0 20px;
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  header#topbar .title { font-size: 15px; font-weight: 600; }
  header#topbar .controls { display: flex; gap: 8px; align-items: center; }
  header#topbar select, header#topbar button {
    background: #fff; color: #202123; border: 1px solid #d0d0d0;
    padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  header#topbar select option { background: #fff; color: #202123; }
  header#topbar button:hover { background: #f7f7f8; }
  /* 流式按钮已删除，保留空位避免后续报错 */

  /* 聊天区 */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  #chat-container::-webkit-scrollbar { width: 8px; }
  #chat-container::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 4px; }
  .msg { margin: 6px 0; display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg .bubble {
    max-width: 70%; padding: 10px 14px; border-radius: 12px;
    line-height: 1.55; word-wrap: break-word; white-space: pre-wrap;
    font-size: 14px;
  }
  .msg.user .bubble { background: #1f4e79; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: #fff; color: #202123; border: 1px solid #e5e5e5; border-bottom-left-radius: 4px; }
  /* bubble-wrap：包裹 bubble + 复制按钮，作为相对定位容器 */
  .msg.assistant .bubble-wrap {
    position: relative;
    max-width: 70%;
    display: block;
  }
  /* 复制按钮：默认隐藏，hover bubble-wrap 时显示 */
  .msg.assistant .bubble-wrap .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(255, 255, 255, 0.85);
    color: #6e6e80;
    border: 1px solid #e5e5e5;
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
    backdrop-filter: blur(4px);
    line-height: 1.4;
  }
  .msg.assistant .bubble-wrap:hover .copy-btn { opacity: 1; }
  .msg.assistant .bubble-wrap .copy-btn:hover {
    background: #1f4e79;
    color: #fff;
    border-color: #1f4e79;
  }
  .msg.assistant .bubble-wrap .copy-btn.copied {
    background: #d4edda;
    color: #155724;
    border-color: #c3e6cb;
    opacity: 1;
  }
  /* 空 bubble（仅 cursor 占位）：消除 padding 和边框，不占视觉空间 */
  .msg.assistant .bubble.placeholder {
    padding: 0;
    border: none;
    background: transparent;
  }
  /* assistant 内可能含折叠区 + bubble + meta，纵向堆叠，紧密贴齐 */
  .msg.assistant { flex-direction: column; align-items: flex-start; gap: 4px; }
  .msg.system .bubble { background: #f0f0f0; color: #6e6e80; border: none; text-align: center; font-size: 13px; max-width: 90%; }
  .msg.error .bubble { background: #fee; color: #c53030; border: 1px solid #fcc; }
  /* meta 是 bubble 的 sibling（不是子元素），简洁无 padding/border */
  .msg .meta {
    font-size: 11px; color: #8e8ea0;
    margin-top: 2px;
    padding: 0;
    border: none;
    max-width: 70%;
    align-self: flex-start;
  }
  .msg.user .meta { text-align: right; align-self: flex-end; }

  .cursor { display: inline-block; width: 8px; height: 16px; background: #1f4e79; animation: blink 1s infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }

  /* 输入区 */
  footer#inputbar {
    background: #fff; border-top: 1px solid #e5e5e5;
    padding: 12px 20px 20px;
    flex-shrink: 0;
  }
  .input-area {
    max-width: 768px; margin: 0 auto;
    display: flex; gap: 10px; align-items: flex-end;
    border: 1px solid #d0d0d0; border-radius: 12px;
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s;
  }
  .input-area:focus-within { border-color: #1f4e79; }
  .input-area textarea {
    flex: 1; border: none; background: transparent;
    padding: 8px 4px; font-size: 14px;
    font-family: inherit; resize: none;
    min-height: 24px; max-height: 200px; outline: none;
    color: #202123;
  }
  .input-area #sendBtn {
    background: #1f4e79; color: #fff; border: none;
    padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
    min-width: 70px; flex-shrink: 0;
  }
  .input-area #sendBtn:hover:not(:disabled) { background: #163d5e; }
  .input-area #sendBtn:disabled { background: #c0c0c0; cursor: not-allowed; }

  .provider-pill {
    display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px;
    background: #e3f2fd; color: #1565c0; margin-right: 4px;
  }
  .provider-pill.fallback { background: #fff3cd; color: #856404; }

  /* 思考过程折叠区（仿 ChatGPT o1 / DeepSeek-R1） */
  details.reasoning-block {
    margin-bottom: 0;
    background: #fafafa;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    font-size: 13px;
    overflow: hidden;
    max-width: 70%;
  }
  details.reasoning-block summary {
    padding: 6px 10px;
    cursor: pointer;
    user-select: none;
    font-weight: 500;
    color: #6e6e80;
    background: #ececf1;
    list-style: none;
    display: flex;
    align-items: center;
    font-size: 12px;
  }
  details.reasoning-block summary::-webkit-details-marker { display: none; }
  details.reasoning-block summary::before {
    content: '▶';
    margin-right: 6px;
    font-size: 10px;
    transition: transform 0.2s;
    display: inline-block;
  }
  details.reasoning-block[open] summary::before {
    transform: rotate(90deg);
  }
  details.reasoning-block[open] summary {
    border-bottom: 1px solid #e5e5e5;
  }
  details.reasoning-block .reasoning-content {
    padding: 10px 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: #6e6e80;
    font-family: ui-monospace, 'Cascadia Mono', 'Consolas', 'Monaco', monospace;
    font-size: 11.5px;
    line-height: 1.6;
    max-height: 300px;
    overflow-y: auto;
  }
  /* reasoning 内容为空时不占 padding 高度 */
  details.reasoning-block .reasoning-content:empty {
    padding: 0;
    min-height: 0;
  }
  details.reasoning-block.thinking {
    /* 流式思考中：左侧加个动效 */
    border-left: 3px solid #1f4e79;
  }

  /* 移动端：折叠侧栏 */
  @media (max-width: 768px) {
    aside#sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- ========== 左侧栏 ========== -->
<aside id="sidebar">
  <!-- Stage 2C 新增：tab 切换（会话 / 文档库） -->
  <div id="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="sessions">💬 会话</button>
    <button class="sidebar-tab" data-tab="documents">📚 文档库</button>
  </div>
  <div id="sidebar-header">
    <button id="newSessionBtn">
      <span class="icon">+</span>
      <span class="text">新会话</span>
    </button>
  </div>
  <!-- Stage 2 新增：会话搜索框 -->
  <div id="session-search-wrap" class="tab-panel" data-panel="sessions">
    <input
      type="text"
      id="sessionSearch"
      placeholder="🔍 搜索会话（标题或消息内容）"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="searchClearBtn" title="清空" style="display:none;">×</button>
  </div>
  <div id="sessionList" class="tab-panel" data-panel="sessions"></div>
  <!-- Stage 2C 新增：文档库面板 -->
  <div id="documentPanel" class="tab-panel" data-panel="documents" style="display:none;">
    <div id="document-toolbar">
      <button id="uploadDocBtn" title="上传新文档">+ 上传文档</button>
    </div>
    <div id="documentList"></div>
    <div id="document-empty" style="padding:20px; color:#8e8ea0; font-size:12px; text-align:center;">
      文档库为空<br>点击"+ 上传文档"添加
    </div>
  </div>
  <!-- Stage 2 新增：加载更多按钮 -->
  <div id="loadMoreWrap">
    <button id="loadMoreBtn" style="display:none;">加载更多 ↓</button>
  </div>
  <div id="sidebar-footer">
    <div class="provider-info" id="providerInfo">加载中…</div>
    <button class="settings-btn" title="刷新会话列表" onclick="loadSessions(true)">↻</button>
  </div>
</aside>

<!-- ========== 主区域 ========== -->
<main id="main">
  <header id="topbar">
    <div class="title" id="topbarTitle">🤖 VerticalAgent Stage 1</div>
    <div class="controls">
      <select id="providerSelect" title="选择 Provider"></select>
      <!-- 流式模式是唯一模式，UI 上不再提供切换 -->
    </div>
  </header>

  <div id="chat-container">
    <div class="msg system">
      <div class="bubble">
        👋 阶段 1 Demo：多 Provider 路由 + SSE 流式响应 + 熔断器<br>
        <small>左侧栏可切换历史会话 · 右上角选 Provider · 流式输出（SSE）</small>
      </div>
    </div>
  </div>

  <footer id="inputbar">
    <div class="input-area">
      <textarea id="input" placeholder="输入消息，回车发送，Shift+回车换行..." rows="1"></textarea>
      <button id="sendBtn" onclick="send()">发送</button>
    </div>
  </footer>
</main>

<script>
let currentSessionId = null;        // 当前正在对话的 session
let isWaiting = false;

const chatEl = document.getElementById('chat-container');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const providerSelect = document.getElementById('providerSelect');
const sessionListEl = document.getElementById('sessionList');
const topbarTitleEl = document.getElementById('topbarTitle');
const providerInfoEl = document.getElementById('providerInfo');
const newSessionBtn = document.getElementById('newSessionBtn');

// ============== 会话管理（Stage 2：搜索 + 翻页） ==============

// 分页 / 搜索状态
let sessionPage = 1;
let sessionPageSize = 20;
let sessionTotal = 0;
let sessionQuery = '';
let sessionLoading = false;

async function loadSessions(reset = false) {
  if (reset) {
    sessionPage = 1;
    sessionListEl.innerHTML = '';
  }
  if (sessionLoading) return;
  sessionLoading = true;
  try {
    const params = new URLSearchParams({
      page: String(sessionPage),
      page_size: String(sessionPageSize),
    });
    if (sessionQuery) params.set('q', sessionQuery);
    const r = await fetch(`/sessions?${params.toString()}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    sessionTotal = d.total;
    renderSessionList(d.sessions, reset);
    updateLoadMoreButton();
    updateSearchSummary();
  } catch (e) {
    console.error('Failed to load sessions:', e);
    if (reset) {
      sessionListEl.innerHTML = `<div style="padding: 20px; color: #c53030; font-size: 12px; text-align: center;">❌ 加载失败：${escapeHtml(e.message)}</div>`;
    }
  } finally {
    sessionLoading = false;
  }
}

function renderSessionList(sessions, reset) {
  if (reset) sessionListEl.innerHTML = '';
  if (reset && (!sessions || sessions.length === 0)) {
    sessionListEl.innerHTML = `<div style="padding: 20px; color: #8e8ea0; font-size: 12px; text-align: center;">${sessionQuery ? '🔍 没有匹配的会话' : '还没有会话'}</div>`;
    return;
  }
  for (const s of sessions) {
    const item = document.createElement('div');
    item.className = 'session-item' + (s.session_id === currentSessionId ? ' active' : '');
    item.dataset.sid = s.session_id;
    // 标题 + 元信息（消息数 / token）
    const meta = `${s.message_count} 条 · ${formatTimeAgo(s.updated_at)}`;
    item.innerHTML = `
      <span class="session-icon">💬</span>
      <span class="session-title-block" style="flex:1; min-width:0; overflow:hidden;">
        <span class="session-title" title="${escapeHtml(s.title)}">${escapeHtml(s.title)}</span>
        <span class="session-meta" style="display:block; font-size:10px; color:#6e6e80; margin-top:1px;">${meta}</span>
      </span>
      <button class="delete-btn" title="删除会话">×</button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) {
        e.stopPropagation();
        deleteSession(s.session_id);
        return;
      }
      switchSession(s.session_id);
    });
    sessionListEl.appendChild(item);
  }
}

function updateLoadMoreButton() {
  const btn = document.getElementById('loadMoreBtn');
  const loadedCount = sessionPage * sessionPageSize;
  if (loadedCount < sessionTotal) {
    btn.style.display = 'block';
    btn.textContent = `加载更多（${loadedCount}/${sessionTotal}）`;
    btn.disabled = false;
  } else if (sessionTotal > 0) {
    btn.style.display = 'block';
    btn.textContent = `已显示全部 ${sessionTotal} 个会话`;
    btn.disabled = true;
    btn.style.opacity = '0.5';
  } else {
    btn.style.display = 'none';
  }
}

function updateSearchSummary() {
  let summary = document.getElementById('searchSummary');
  if (!summary) {
    summary = document.createElement('div');
    summary.id = 'searchSummary';
    document.getElementById('session-search-wrap').after(summary);
  }
  if (sessionQuery) {
    summary.style.display = 'block';
    summary.textContent = `🔍 "${sessionQuery}" — 命中 ${sessionTotal} 个会话`;
  } else {
    summary.style.display = 'none';
  }
}

function formatTimeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() / 1000 - ts;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return `${Math.floor(diff / 60)} 分钟前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} 小时前`;
  if (diff < 86400 * 7) return `${Math.floor(diff / 86400)} 天前`;
  const d = new Date(ts * 1000);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

  sessionPage += 1;

async function switchSession(sid) {
  if (sid === currentSessionId) return;
  if (isWaiting) {
    if (!confirm('正在对话中，切换会丢失当前生成。确认切换？')) return;
  }
  currentSessionId = sid;
  // 更新侧栏高亮
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.dataset.sid === sid);
  });
  // 加载历史消息
  await loadSessionHistory(sid);
}

async function loadSessionHistory(sid) {
  try {
    // Stage 2：走 /sessions/{sid}/messages 拿完整 reasoning + tokens
    const r = await fetch(`/sessions/${sid}/messages`);
    if (!r.ok) {
      chatEl.innerHTML = `<div class="msg error"><div class="bubble">❌ 会话不存在或已删除</div></div>`;
      return;
    }
    const d = await r.json();
    renderMessages(d.messages);
    // 顶部加一条小提示，展示当前加载的历史会话元信息
    if (d.messages && d.messages.length > 0) {
      const meta = `${d.title} · ${d.message_count} 条消息`;
      const hint = document.createElement('div');
      hint.className = 'msg system';
      hint.innerHTML = `<div class="bubble" style="font-size:11px;">📂 已加载历史会话：${escapeHtml(meta)}</div>`;
      chatEl.insertBefore(hint, chatEl.firstChild);
      chatEl.scrollTop = chatEl.scrollHeight;
    }
  } catch (e) {
    chatEl.innerHTML = `<div class="msg error"><div class="bubble">❌ 加载失败: ${e.message}</div></div>`;
  }
}

function renderMessages(messages) {
  chatEl.innerHTML = '';
  if (!messages || messages.length === 0) {
    chatEl.innerHTML = `<div class="msg system"><div class="bubble">空会话</div></div>`;
    return;
  }
  for (const msg of messages) {
    if (msg.role === 'user') {
      appendMsg('user', msg.content, false, null);
    } else if (msg.role === 'assistant') {
      // Stage 2：assistant 消息如有 reasoning，渲染为折叠区 + meta 行
      renderAssistantMessage(msg);
    }
    // system 消息跳过（理论上不会有，跳过更安全）
  }
  chatEl.scrollTop = chatEl.scrollHeight;
}

function renderAssistantMessage(msg) {
  // 创建 assistantEl（仿照 sendStream 的结构）
  const assistantEl = document.createElement('div');
  assistantEl.className = 'msg assistant';
  assistantEl.dataset.sid = msg.session_id;

  // 思考过程折叠区（如果有）
  if (msg.reasoning && msg.reasoning.trim()) {
    const reasoningEl = document.createElement('details');
    reasoningEl.className = 'reasoning-block';
    const summary = document.createElement('summary');
    summary.textContent = `💭 思考过程（${msg.reasoning.length} 字符，点击展开）`;
    const reasoningContent = document.createElement('div');
    reasoningContent.className = 'reasoning-content';
    reasoningContent.textContent = msg.reasoning;
    reasoningEl.appendChild(summary);
    reasoningEl.appendChild(reasoningContent);
    assistantEl.appendChild(reasoningEl);
  }

  // bubble-wrap（含复制按钮）
  const { wrap } = createBubbleWrap(msg.content);
  assistantEl.appendChild(wrap);

  // meta 行（放在 assistantEl 末尾，跟 bubble 平级）
  const meta = document.createElement('div');
  meta.className = 'meta';
  const fallbackFlag = msg.is_fallback ? ' · ⚠️ fallback' : '';
  const reasoningFlag = msg.reasoning ? ` · 💭 ${msg.reasoning.length} 字思考` : '';
  meta.innerHTML = `<span class="provider-pill">${escapeHtml(msg.provider || '?')}</span> ` +
                   `📊 ${msg.total_tokens || 0} tokens${fallbackFlag}${reasoningFlag}`;
  assistantEl.appendChild(meta);

  chatEl.appendChild(assistantEl);
}

async function newSession() {

  if (isWaiting) {

  }

}

async function deleteSession(sid) {
  if (!confirm('删除这个会话？此操作不可恢复。')) return;
  try {
    await fetch(`/sessions/${sid}`, { method: 'DELETE' });
    if (sid === currentSessionId) {
      currentSessionId = null;
      chatEl.innerHTML = `<div class="msg system"><div class="bubble">🗑️ 会话已删除</div></div>`;
    }
    await loadSessions();
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

// ============== 发送消息 ==============
// 只支持流式模式（SSE）。整段模式（POST /chat）保留为 API 但前端不调用。

async function send() {
  if (isWaiting) return;
  const msg = inputEl.value.trim();
  if (!msg) return;

  appendMsg('user', msg);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  setWaiting(true);

  const selectedProvider = providerSelect.value;
  try {
    // 直接走流式（SSE）
    await sendStream(msg, selectedProvider);
  } finally {
    // 关键：无论成功还是异常，都要复位 isWaiting + 按钮
    setWaiting(false);
    inputEl.focus();
  }

  // 发送后刷新侧栏（标题已更新）
  try { await loadSessions(true); } catch (e) { console.error('loadSessions failed:', e); }
  // 重新高亮当前会话
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.dataset.sid === currentSessionId);
  });
}

async function sendStream(msg, provider) {
  // 创建 assistant 消息容器（手写，避免 appendMsg 创建空 bubble）
  const assistantEl = document.createElement('div');
  assistantEl.className = 'msg assistant';
  chatEl.appendChild(assistantEl);
  chatEl.scrollTop = chatEl.scrollHeight;

  let bubble = null;           // 内容气泡（收到第一个 content_delta 时创建）
  let bubbleWrap = null;       // 包裹 bubble + 复制按钮的容器
  let reasoningEl = null;      // 折叠区（收到第一个 reasoning_delta 时创建）
  let reasoningContentEl = null;
  let fullText = '';
  let fullReasoning = '';
  let userExpandedReasoning = false;  // 用户是否主动展开了折叠区

  try {
    const r = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: msg,
        session_id: currentSessionId,
        provider: provider || null,
      }),
    });

    if (!r.ok) {
      const err = await r.json();
      let errType = 'unknown';
      let errMsg = r.statusText;
      if (Array.isArray(err.detail)) {
        errType = 'validation_error';
        errMsg = err.detail.map(e => `${e.loc?.join('.')}: ${e.msg}`).join('; ');
      } else if (err.detail && typeof err.detail === 'object') {
        errType = err.detail.error_type || 'unknown';
        errMsg = err.detail.message || err.detail.error_msg || r.statusText;
      }
      bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.background = '#fee';
      bubble.style.color = '#c53030';
      bubble.textContent = `❌ [${errType}] ${errMsg}`;
      assistantEl.appendChild(bubble);
      assistantEl.classList.add('error');
      return;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let usage = {};
    let providerUsed = '';
    let fallbackUsed = false;

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split('\n\n');
      buffer = events.pop() || '';
      for (const ev of events) {
        const lines = ev.split('\n');
        let eventName = 'message';
        let dataLine = '';
        for (const line of lines) {
          if (line.startsWith('event:')) eventName = line.slice(6).trim();
          else if (line.startsWith('data:')) dataLine += line.slice(5).trim();
        }
        if (!dataLine) continue;
        try {
          const data = JSON.parse(dataLine);
          if (eventName === 'start') {
            currentSessionId = data.session_id;
            providerUsed = data.primary_provider;
          } else if (eventName === 'reasoning_delta') {
            // 思考过程：累积到折叠区（懒加载：首次才创建 details）
            fullReasoning += data.delta;
            if (!reasoningEl) {
              reasoningEl = document.createElement('details');
              reasoningEl.className = 'reasoning-block thinking';
              reasoningEl.open = false;
              reasoningEl.dataset.startTs = Date.now();
              const summary = document.createElement('summary');
              summary.textContent = '💭 思考过程（思考中…）';
              reasoningContentEl = document.createElement('div');
              reasoningContentEl.className = 'reasoning-content';
              reasoningEl.appendChild(summary);
              reasoningEl.appendChild(reasoningContentEl);
              // 监听用户是否主动展开
              reasoningEl.addEventListener('toggle', () => {
                if (reasoningEl.open) userExpandedReasoning = true;
              });
              assistantEl.appendChild(reasoningEl);
            }
            // 把累积的 reasoning 写入（首次写入前不是空字符串）
            reasoningContentEl.textContent = fullReasoning;
            providerUsed = data.provider;
            chatEl.scrollTop = chatEl.scrollHeight;
          } else if (eventName === 'content_delta') {
            // 正常内容：累积到 bubble（懒加载：首次才创建 bubble）
            fullText += data.delta;
            if (!bubble) {
              // 首次：用 bubble-wrap 包住 button + bubble
              const created = createBubbleWrap(fullText);
              bubble = created.bubble;
              bubbleWrap = created.wrap;
              assistantEl.appendChild(bubbleWrap);
            } else {
              // 后续追加 + cursor
              bubble.innerHTML = escapeHtml(fullText) + '<span class="cursor"></span>';
            }
            // 折叠思考区（如果用户没主动展开过）
            if (reasoningEl && !userExpandedReasoning) {
              reasoningEl.open = false;
              const summary = reasoningEl.querySelector('summary');
              if (summary) summary.textContent = '💭 思考过程（点击展开）';
            }
            chatEl.scrollTop = chatEl.scrollHeight;
            providerUsed = data.provider;
          } else if (eventName === 'done') {
            usage = data.usage || {};
            if (data.provider && data.provider !== providerUsed) fallbackUsed = true;
            providerUsed = data.provider;
            if (bubble) bubble.innerHTML = escapeHtml(fullText);
            // 思考区标题更新为「完成」
            if (reasoningEl) {
              const summary = reasoningEl.querySelector('summary');
              if (summary) {
                const secs = Math.round((Date.now() - (reasoningEl.dataset.startTs || Date.now())) / 1000);
                summary.textContent = `💭 思考过程（${fullReasoning.length} 字符，点击展开）`;
              }
              reasoningEl.classList.remove('thinking');
            }
            // meta 行：放在 assistantEl 里（和 bubble 平级），不再塞进 bubble
            const meta = document.createElement('div');
            meta.className = 'meta';
            const pillClass = fallbackUsed ? 'provider-pill fallback' : 'provider-pill';
            meta.innerHTML = `<span class="${pillClass}">${providerUsed}</span> ` +
                             `📊 ${usage.completion_tokens || 0} tokens · 🌊 SSE` +
                             (fullReasoning ? ` · 💭 ${fullReasoning.length} 字思考` : '');
            assistantEl.appendChild(meta);
            // 生成完成：自动 scroll 到 bubble 第一行（让用户从头阅读）
            if (bubble) {
              requestAnimationFrame(() => {
                // 计算 bubble 相对 chat-container 顶部的位置，平滑滚动
                const containerRect = chatEl.getBoundingClientRect();
                const bubbleRect = bubble.getBoundingClientRect();
                const offset = bubbleRect.top - containerRect.top + chatEl.scrollTop;
                chatEl.scrollTo({ top: offset, behavior: 'smooth' });
              });
            }
          } else if (eventName === 'error') {
            // 错误：直接显示
            const errEl = document.createElement('div');
            errEl.className = 'bubble';
            errEl.textContent = `❌ [${data.error_type}] ${data.error_msg}`;
            errEl.style.background = '#fee';
            errEl.style.color = '#c53030';
            assistantEl.appendChild(errEl);
            assistantEl.classList.add('error');
          }
        } catch (e) {
          console.error('SSE parse error:', e);
        }
      }
    }
  } catch (e) {
    bubble.innerHTML = `❌ 网络错误: ${e.message}`;
    bubble.parentElement.classList.add('error');
  } finally {
    // 双保险：无论正常结束、异常、SSE 错误，都确保状态复位
    setWaiting(false);
    inputEl.focus();
  }
}

// ============== UI helpers ==============

function appendMsg(role, text, isHtml = false, meta = null) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isHtml) bubble.innerHTML = text;
  else bubble.textContent = text;
  div.appendChild(bubble);
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    if (typeof meta === 'string') m.innerHTML = meta;
    div.appendChild(m);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function escapeHtml(s) {
  const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
  return String(s).replace(/[&<>"']/g, c => map[c]);
}

// ============== 复制按钮 + bubble-wrap ==============
// SSE 流式时 bubble.innerHTML 会被反复覆盖，所以按钮不能放在 bubble 内部。
// 用 bubble-wrap 容器包住按钮 + bubble，按钮作为 bubble 的 sibling 不受影响。

function createBubbleWrap(initialText = '', options = {}) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  // 复制按钮（右上角）
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = '📋 复制';
  copyBtn.title = '复制全文到剪贴板';
  // 阻止按钮冒泡触发其他事件
  copyBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    const text = bubble.textContent || '';
    const ok = await copyToClipboard(text);
    if (ok) {
      copyBtn.textContent = '✅ 已复制';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '📋 复制';
        copyBtn.classList.remove('copied');
      }, 1500);
    } else {
      copyBtn.textContent = '❌ 失败';
      setTimeout(() => { copyBtn.textContent = '📋 复制'; }, 1500);
    }
  });
  wrap.appendChild(copyBtn);

  // bubble 本身
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (initialText) {
    bubble.innerHTML = escapeHtml(initialText);
  }
  wrap.appendChild(bubble);

  return { wrap, bubble, copyBtn };
}

async function copyToClipboard(text) {
  // 现代 API
  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (e) {
      // 降级
    }
  }
  // 降级方案：临时 textarea + execCommand
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) {
    console.error('copy failed:', e);
    return false;
  }
}

function setWaiting(waiting) {
  isWaiting = waiting;
  sendBtn.disabled = waiting;
  sendBtn.textContent = waiting ? '...' : '发送';
  inputEl.disabled = waiting;
}

async function loadProviders() {

    const d = await r.json();
    providerSelect.innerHTML = '<option value="">Auto</option>';
    d.providers.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.provider;
      const icon = p.state === 'closed' ? '✅' : p.state === 'open' ? '🔴' : '🟡';
      opt.textContent = `${icon} ${p.provider}`;
      providerSelect.appendChild(opt);
    });
    // 更新侧栏底部信息
    const summary = d.providers.map(p => {
      const icon = p.state === 'closed' ? '🟢' : p.state === 'open' ? '🔴' : '🟡';
      return `${icon}${p.provider}`;
    }).join(' · ');
    providerInfoEl.textContent = summary || '无 Provider';
    providerInfoEl.title = summary;
  } catch (e) {
    providerInfoEl.textContent = '❌ 后端离线';
  }
}

document.querySelectorAll('.sidebar-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.tab;
    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t === tab));
    document.querySelectorAll('.tab-panel').forEach(p => {
      p.style.display = p.dataset.panel === target ? '' : 'none';
    });
    if (target === 'documents') loadDocuments();
  });
});

// 加载文档列表
async function loadDocuments() {
  try {
    const r = await fetch('/documents?page_size=50');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    renderDocumentList(d.documents);
  } catch (e) {
    console.error('Failed to load documents:', e);
    docListEl.innerHTML = `<div style="padding:20px; color:#c53030; font-size:12px; text-align:center;">❌ 加载失败</div>`;
    docEmptyEl.style.display = 'none';
  }
}

function renderDocumentList(docs) {
  docListEl.innerHTML = '';
  if (!docs || docs.length === 0) {
    docEmptyEl.style.display = 'block';
    return;
  }
  docEmptyEl.style.display = 'none';
  for (const d of docs) {
    const item = document.createElement('div');
    item.className = 'doc-item';
    const created = new Date(d.created_at * 1000).toLocaleDateString();
    item.innerHTML = `
      <div class="doc-title" title="${escapeHtml(d.title)}">${escapeHtml(d.title)}</div>
      <div class="doc-meta">
        <span>📄 ${d.chunk_count} 段 · ${d.embedding_dim || '?'}d</span>
        <span>${created}</span>
      </div>
      <button class="doc-delete" title="删除文档">×</button>
    `;
    item.querySelector('.doc-delete').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`删除文档 "${d.title}"？\n\n该文档的所有切片会被一并删除。`)) return;
      try {
        await fetch(`/documents/${d.id}`, { method: 'DELETE' });
        loadDocuments();
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    });
    item.addEventListener('click', () => {
      // 点击文档展示 chunks 预览（先用 prompt 看内容）
      const preview = `📄 ${d.title}\n\n` +
        `来源: ${d.source || '(手动输入)'}\n` +
        `类型: ${d.doc_type}\n` +
        `切片数: ${d.chunk_count}\n` +
        `Embedding: ${d.embedding_provider || '?'}/${d.embedding_model || '?'} (${d.embedding_dim || '?'}d)\n` +
        `创建时间: ${new Date(d.created_at * 1000).toLocaleString()}`;
      alert(preview);
    });
    docListEl.appendChild(item);
  }
}

// 上传 modal（3 个 tab：粘贴文本 / 上传文件 / 导入 JSON）
const uploadModal = document.createElement('div');
uploadModal.id = 'uploadDocModal';
uploadModal.innerHTML = `
  <div class="modal-content">
    <h3>📚 添加文档到知识库</h3>
    <div class="upload-tabs">
      <button class="upload-tab active" data-tab="text">📝 粘贴文本</button>
      <button class="upload-tab" data-tab="file">📤 上传文件</button>
      <button class="upload-tab" data-tab="json">{ } 导入 JSON</button>
    </div>

    <!-- Tab 1: 粘贴文本 -->
    <div class="upload-panel" data-panel="text">
      <label>文档标题</label>

      <label>文档内容（支持长文本，会自动切片）</label>
      <textarea id="docContentInput" placeholder="粘贴文档正文……"></textarea>
      <label>来源（可选）</label>

    <!-- Tab 2: 上传文件 -->
    <div class="upload-panel" data-panel="file" style="display:none;">

      <div id="fileDropZone">
        <input type="file" id="docFileInput" accept=".txt,.md,.markdown,.docx,.pdf" />
        <div class="file-drop-hint">

          <small>支持 .txt / .md / .docx / .pdf（≤20MB）</small>
        </div>
        <div id="fileSelectedInfo" style="display:none;">
          <span id="fileSelectedName"></span>

        </div>

    <!-- Tab 3: 导入 JSON -->
    <div class="upload-panel" data-panel="json" style="display:none;">
      <label>JSON 格式（chunks 数组，可选带 embedding）</label>

    {"chunk_index": 1, "content": "..."}
  ]
}'></textarea>
      <small style="color:#6e6e80;">
        💡 <b>embedding</b> 字段可选。维度与当前 EMBEDDING_DIMENSION 不一致会自动重算。<br>
        适配 LangChain / LlamaIndex / Cursor 导出的 JSON 知识库。
      </small>
    </div>

    <div class="modal-actions">

document.body.appendChild(uploadModal);

// tab 切换
uploadModal.querySelectorAll('.upload-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.tab;
    uploadModal.querySelectorAll('.upload-tab').forEach(t => t.classList.toggle('active', t === tab));
    uploadModal.querySelectorAll('.upload-panel').forEach(p => {
      p.style.display = p.dataset.panel === target ? '' : 'none';
    });
  });
});

// 文件选择 / 拖拽
const fileInput = document.getElementById('docFileInput');
const fileSelectedInfo = document.getElementById('fileSelectedInfo');
const fileSelectedName = document.getElementById('fileSelectedName');
const fileDropZone = document.getElementById('fileDropZone');

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) showSelectedFile(fileInput.files[0]);
});
document.getElementById('fileClearBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  fileInput.value = '';
  fileSelectedInfo.style.display = 'none';
  fileDropZone.querySelector('.file-drop-hint').style.display = 'block';
});
fileDropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  fileDropZone.classList.add('dragover');
});
fileDropZone.addEventListener('dragleave', () => fileDropZone.classList.remove('dragover'));
fileDropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  fileDropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) {
    fileInput.files = e.dataTransfer.files;
    showSelectedFile(e.dataTransfer.files[0]);
  }
});

function showSelectedFile(f) {
  fileSelectedName.textContent = `${f.name} (${(f.size / 1024).toFixed(1)} KB)`;
  fileSelectedInfo.style.display = 'flex';
  fileDropZone.querySelector('.file-drop-hint').style.display = 'none';
}

uploadDocBtn.addEventListener('click', () => {
  uploadModal.classList.add('show');
  document.getElementById('docTitleInput').focus();
});
document.getElementById('docCancelBtn').addEventListener('click', () => {
  uploadModal.classList.remove('show');
});
uploadModal.addEventListener('click', (e) => {
  if (e.target === uploadModal) uploadModal.classList.remove('show');
});

document.getElementById('docSubmitBtn').addEventListener('click', async () => {
  const submitBtn = document.getElementById('docSubmitBtn');
  const activeTab = uploadModal.querySelector('.upload-tab.active').dataset.tab;

  submitBtn.disabled = true;
  submitBtn.textContent = '上传中...';
  try {
    let doc;
    if (activeTab === 'text') {
      doc = await submitText();
    } else if (activeTab === 'file') {
      doc = await submitFile();
    } else if (activeTab === 'json') {
      doc = await submitJson();
    }
    uploadModal.classList.remove('show');
    resetAllForms();
    loadDocuments();
    alert(`✅ 上传成功\n\n文档 "${doc.title}" 已切为 ${doc.chunk_count} 段并 embedding 完成`);
  } catch (err) {
    alert('❌ 上传失败: ' + err.message);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '上传并 Embedding';
  }
});

async function submitText() {
  const title = document.getElementById('docTitleInput').value.trim();
  const content = document.getElementById('docContentInput').value.trim();
  const source = document.getElementById('docSourceInput').value.trim() || 'manual';
  if (!title || !content) throw new Error('标题和内容不能为空');
  const r = await fetch('/documents', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, content, source, doc_type: 'text' }),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${r.status}`);
  }
  return r.json();
}

async function submitFile() {
  const file = fileInput.files[0];
  if (!file) throw new Error('请先选择文件');
  const title = document.getElementById('docFileTitle').value.trim();
  const formData = new FormData();
  formData.append('file', file);
  if (title) formData.append('title', title);
  const r = await fetch('/documents/upload', { method: 'POST', body: formData });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${r.status}`);
  }
  return r.json();
}

async function submitJson() {
  const jsonText = document.getElementById('docJsonInput').value.trim();
  if (!jsonText) throw new Error('请粘贴 JSON');
  let payload;
  try {
    payload = JSON.parse(jsonText);
  } catch (e) {
    throw new Error('JSON 解析失败: ' + e.message);
  }
  // 基础校验
  if (!payload.title) throw new Error('JSON 必须包含 title 字段');
  if (!Array.isArray(payload.chunks) || payload.chunks.length === 0) throw new Error('JSON 必须包含非空 chunks 数组');
  if (!payload.chunks.every(c => c.content)) throw new Error('每个 chunk 必须有 content 字段');

  const r = await fetch('/documents/import', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${r.status}`);
  }
  return r.json();
}

function resetAllForms() {
  document.getElementById('docTitleInput').value = '';
  document.getElementById('docContentInput').value = '';
  document.getElementById('docSourceInput').value = '';
  document.getElementById('docFileTitle').value = '';
  document.getElementById('docJsonInput').value = '';
  fileInput.value = '';
  fileSelectedInfo.style.display = 'none';
  fileDropZone.querySelector('.file-drop-hint').style.display = 'block';
}
    submitBtn.disabled = false;
    submitBtn.textContent = '上传并 Embedding';
  }
});
</script>

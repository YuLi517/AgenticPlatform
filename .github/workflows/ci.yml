name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-stage2:
    name: Stage 2 (root) — persistence + RAG + file upload
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check (all modules)
        run: |
          python -m py_compile main.py database.py models.py repository.py embedding.py rag.py document_parser.py
          echo "OK - all modules compile"
      - name: Import test (no API call, fake keys)
        run: |
          LLM_API_KEY=sk-fake-for-ci LLM_PROVIDER=deepseek \
          DEEPSEEK_API_KEY=sk-fake-a DEEPSEEK_BASE_URL=https://api.deepseek.com/v1 DEEPSEEK_MODEL=deepseek-chat \
          QWEN_API_KEY=sk-fake-b QWEN_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1 QWEN_MODEL=qwen-plus \
          EMBEDDING_PROVIDER=openai EMBEDDING_API_KEY=sk-fake-c EMBEDDING_BASE_URL=https://api.openai.com/v1 EMBEDDING_MODEL=text-embedding-3-small \
          python -c "
          import main, database, models, repository, embedding, rag, document_parser
          from fastapi.testclient import TestClient
          with TestClient(main.app) as client:
              r = client.get('/health')
              assert r.status_code == 200, f'health failed: {r.status_code} {r.text}'
              data = r.json()
              assert 'db' in data, f'health missing db stats: {data}'
              assert 'sessions' in data['db'], f'health missing sessions count: {data}'
              print(f'OK - {len(main.providers)} providers, health has DB stats (sessions={data[\"db\"][\"sessions\"]})')
          "
      - name: HTML validation
        run: python -c "from html.parser import HTMLParser; HTMLParser().feed(open('static/index.html', encoding='utf-8').read()); print('OK')"
      - name: pyflakes
        run: |
          pip install pyflakes
          pyflakes main.py database.py models.py repository.py embedding.py rag.py document_parser.py
          echo "OK - pyflakes passed"

  test-stage1:
    name: Stage 1 (multi-provider + SSE + circuit breaker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./stage1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile main.py
      - name: Import test (multi-provider config)
        run: |
          LLM_PROVIDERS=deepseek,qwen \
          DEEPSEEK_API_KEY=sk-fake-a DEEPSEEK_BASE_URL=https://api.deepseek.com/v1 DEEPSEEK_MODEL=deepseek-chat \
          QWEN_API_KEY=sk-fake-b QWEN_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1 QWEN_MODEL=qwen-plus \
          python -c "import main; print(f'OK - {len(main.providers)} providers loaded')"
      - name: HTML validation
        run: python -c "from html.parser import HTMLParser; HTMLParser().feed(open('static/index.html', encoding='utf-8').read()); print('OK')"
      - name: pyflakes
        run: |
          pip install pyflakes
          pyflakes main.py
          echo "OK - pyflakes passed"

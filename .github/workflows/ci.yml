name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-stage0:
    name: Stage 0 (root)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile main.py
      - name: Import test
        run: LLM_API_KEY=sk-fake-for-ci LLM_PROVIDER=deepseek python -c "import main; print('OK')"
      - name: HTML validation
        run: python -c "from html.parser import HTMLParser; HTMLParser().feed(open('static/index.html', encoding='utf-8').read()); print('OK')"

  test-stage1:
    name: Stage 1 (multi-provider + SSE + circuit breaker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./stage1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile main.py
      - name: Import test (multi-provider config)
        run: |
          LLM_PROVIDERS=deepseek,qwen \
          DEEPSEEK_API_KEY=sk-fake-a DEEPSEEK_BASE_URL=https://api.deepseek.com/v1 DEEPSEEK_MODEL=deepseek-chat \
          QWEN_API_KEY=sk-fake-b QWEN_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1 QWEN_MODEL=qwen-plus \
          python -c "import main; print(f'OK - {len(main.providers)} providers loaded')"
      - name: HTML validation
        run: python -c "from html.parser import HTMLParser; HTMLParser().feed(open('static/index.html', encoding='utf-8').read()); print('OK')"
      - name: pyflakes
        run: |
          pip install pyflakes
          pyflakes main.py
          echo "OK - pyflakes passed"
